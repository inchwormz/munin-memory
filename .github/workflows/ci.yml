name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Build
        run: cargo build --locked --bin munin

      - name: Test
        run: cargo test --locked

      - name: Resolver and skill contracts
        run: cargo run --locked --bin munin -- install --check-resolvable

      - name: Non-technical release check
        shell: pwsh
        run: |
          $bin = if ($IsWindows) { ".\target\debug\munin.exe" } else { "./target/debug/munin" }
          ./scripts/munin-release-check.ps1 -MuninBin $bin

  licenses:
    name: License allowlist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses
